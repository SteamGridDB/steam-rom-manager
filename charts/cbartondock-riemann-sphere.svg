<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <style>
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeInPoint {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .data-line-0 {
      stroke-dasharray: 1290;
      stroke-dashoffset: 1290;
      animation: drawLine 2s ease-out forwards;
    }
    .data-point {
      opacity: 0;
      animation: fadeInPoint 0.5s ease-out forwards;
    }
    .chart-bg { fill: #fff; }
    .chart-text { fill: #24292e; }
    .chart-muted { fill: #6a737d; }
    .chart-grid { stroke: #eee; }
    .chart-axis { stroke: #6a737d; }
    @media (prefers-color-scheme: dark) {
      .chart-bg { fill: #0d1117; }
      .chart-text { fill: #e6edf3; }
      .chart-muted { fill: #8b949e; }
      .chart-grid { stroke: #21262d; }
      .chart-axis { stroke: #8b949e; }
    }
  </style>
  <rect width="800" height="400" class="chart-bg" />
  <text x="400" y="14" text-anchor="middle" class="chart-text" font-size="16" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">cbartondock/riemann-sphere Star History</text>
  
  <g class="grid">
